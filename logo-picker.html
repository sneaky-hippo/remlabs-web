<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>REM Labs — Logo Picker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff; --bg2: #f5f5f7; --border: rgba(0,0,0,0.08);
      --text: #1d1d1f; --text2: #6e6e73; --text3: #aeaeb2;
      --accent: #6366f1;
      --font: 'Inter', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: var(--font); color: var(--text); -webkit-font-smoothing: antialiased; }

    header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 6px; }
    header p { font-size: 0.875rem; font-weight: 300; color: var(--text2); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 32px 40px 60px;
      max-width: 1400px;
    }

    .logo-card {
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 28px 16px 18px;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
      background: var(--bg);
      user-select: none;
    }
    .logo-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
      transform: translateY(-2px);
    }
    .logo-card.selected {
      border-color: var(--accent);
      background: rgba(99,102,241,0.04);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }

    .logo-preview {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-meta { text-align: center; }
    .logo-num { font-size: 0.65rem; font-weight: 600; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 3px; }
    .logo-name { font-size: 0.75rem; font-weight: 400; color: var(--text2); }

    /* Selected display */
    .selected-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 16px 40px;
      display: flex; align-items: center; gap: 20px;
      transform: translateY(100%);
      transition: transform 0.2s;
      z-index: 100;
    }
    .selected-bar.visible { transform: translateY(0); }
    .sel-preview { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .sel-info { flex: 1; }
    .sel-label { font-size: 0.72rem; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .sel-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .sel-copy {
      padding: 9px 20px; border-radius: 9px;
      background: var(--accent); color: #fff;
      font-size: 0.82rem; font-weight: 500;
      border: none; cursor: pointer; transition: opacity 0.15s;
      font-family: var(--font);
    }
    .sel-copy:hover { opacity: 0.85; }
    .sel-dismiss { font-size: 0.82rem; font-weight: 400; color: var(--text3); cursor: pointer; padding: 8px; }
    .sel-dismiss:hover { color: var(--text2); }

    /* Toast */
    .toast {
      position: fixed; top: 20px; right: 20px;
      background: var(--text); color: #fff;
      padding: 10px 18px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 500;
      opacity: 0; transform: translateY(-8px);
      transition: all 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* SVG code textarea */
    .code-area {
      display: none;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.72rem; font-family: monospace;
      color: var(--text2); resize: none;
      width: 260px; height: 60px;
    }
  </style>
</head>
<body>

<header>
  <h1>REM Labs — Logo Picker</h1>
  <p>50 options. Click to select. Copy SVG button copies the code.</p>
</header>

<div class="grid" id="grid"></div>

<!-- Selected bar -->
<div class="selected-bar" id="sel-bar">
  <div class="sel-preview" id="sel-preview"></div>
  <div class="sel-info">
    <div class="sel-label">Selected</div>
    <div class="sel-name" id="sel-name">—</div>
  </div>
  <textarea class="code-area" id="svg-code" readonly></textarea>
  <button class="sel-copy" onclick="copySvg()">Copy SVG</button>
  <span class="sel-dismiss" onclick="dismiss()">✕</span>
</div>

<div class="toast" id="toast">SVG copied!</div>

const grid = document.getElementById('grid');
let selectedIdx = -1;

logos.forEach((logo, i) => {
  const card = document.createElement('div');
  card.className = 'logo-card';
  card.innerHTML = `
    <div class="logo-preview">${logo.svg}</div>
    <div class="logo-meta">
      <div class="logo-num">#${String(i+1).padStart(2,'0')}</div>
      <div class="logo-name">${logo.name}</div>
    </div>
  `;
  card.addEventListener('click', () => selectLogo(i, card, logo));
  grid.appendChild(card);
});

function selectLogo(idx, card, logo) {
  document.querySelectorAll('.logo-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedIdx = idx;

  document.getElementById('sel-preview').innerHTML = logo.svg;
  document.getElementById('sel-name').textContent = `#${idx+1} — ${logo.name}`;
  document.getElementById('svg-code').value = logo.svg.replace(/\s+/g,' ').trim();
  document.getElementById('sel-bar').classList.add('visible');
}

function dismiss() {
  document.querySelectorAll('.logo-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('sel-bar').classList.remove('visible');
}

function copySvg() {
  const ta = document.getElementById('svg-code');
  navigator.clipboard.writeText(ta.value).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}
